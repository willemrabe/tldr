<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-row">
      <h1>Autlaut</h1>
      <span id="status-dot" class="dot offline" title="Server offline" role="status" aria-label="Server status: offline"></span>
    </div>
    <nav aria-label="Main">
      <button class="tab active" data-tab="history">History</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>
  </header>

  <main>
    <!-- History Tab -->
    <section id="tab-history" class="tab-content active">
      <div id="history-list"></div>
      <div id="history-empty" class="empty-state" style="display:none;">
        <svg class="empty-icon" viewBox="0 0 24 24" width="48" height="48"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.47 4.47 0 0 0 2.5-3.5zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z"/></svg>
        <p class="empty-title">No recordings yet</p>
        <p class="hint">Select text on any page and click the speaker button to get started.</p>
      </div>
      <button id="clear-history-btn" class="danger-btn" style="display:none;">Clear All History</button>
    </section>

    <!-- Settings Tab -->
    <section id="tab-settings" class="tab-content">
      <form id="settings-form" onsubmit="return false;">
        <fieldset>
          <legend class="sr-only">TTS Settings</legend>
          <div class="setting-group">
            <label for="server-url">Server URL</label>
            <input type="text" id="server-url" placeholder="http://localhost:8787">
          </div>
          <div class="setting-group">
            <label for="voice-select">Voice</label>
            <div class="voice-row">
              <select id="voice-select">
                <option value="af_heart">af_heart (default)</option>
              </select>
              <button type="button" id="preview-voice-btn" class="icon-btn" title="Preview voice" aria-label="Preview voice">
                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
              </button>
            </div>
            <div id="preview-status" class="preview-status" aria-live="polite"></div>
          </div>
          <div class="setting-group">
            <label for="speed-range">Speed: <span id="speed-value">1.0x</span></label>
            <input type="range" id="speed-range" min="0.5" max="2" step="0.25" value="1">
          </div>
          <button type="button" id="save-settings-btn" class="primary-btn">Save Settings</button>
          <p id="settings-status" class="status-msg" aria-live="polite"></p>
        </fieldset>
      </form>
    </section>
  </main>

  <script src="lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
